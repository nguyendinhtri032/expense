<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Quản lý Chi tiêu</title>
  <meta name="theme-color" content="#f4a0b9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chi tiêu">
  <link rel="apple-touch-icon" href="images/logo.png">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header id="header">
    <div class="header-top">
      <h1>Chi tiêu</h1>
      <div class="header-actions">
        <button id="btn-reload" aria-label="Tải lại"><img src="images/rotate.png" alt="Reload" class="header-icon"></button>
        <button id="btn-settings" aria-label="Cài đặt"><img src="images/setting-lines.png" alt="Settings" class="header-icon"></button>
      </div>
    </div>
    <div class="header-month">
      <button id="btn-prev-month" aria-label="Tháng trước">◀</button>
      <input type="month" id="month-selector">
      <button id="btn-next-month" aria-label="Tháng sau">▶</button>
    </div>
    <div class="header-summary">
      <div class="summary-item">
        <span class="summary-label">Đã chi</span>
        <span class="summary-value" id="total-spent">0 đ</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Ngân sách</span>
        <span class="summary-value" id="total-budget">-- đ</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Còn lại</span>
        <span class="summary-value" id="total-remaining">-- đ</span>
      </div>
    </div>
  </header>

  <!-- Tab bar -->
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="main">Chi tiêu</button>
    <button class="tab-btn" data-tab="chart">Biểu đồ</button>
  </div>

  <!-- Main -->
  <main id="main">
    <!-- Budget Section -->
    <section id="budget-section">
      <div class="section-header">
        <h2>Ngân sách</h2>
        <button id="btn-add-budget">+ Thêm</button>
      </div>
      <div id="budget-list"></div>
    </section>

    <!-- Expense Section -->
    <section id="expense-section">
      <div class="section-header">
        <h2>Chi tiêu</h2>
        <div class="sort-controls">
          <button class="sort-btn active" data-sort="id">Mới nhất</button>
          <button class="sort-btn" data-sort="amount">Số tiền</button>
          <button class="sort-btn" data-sort="date">Ngày</button>
        </div>
      </div>
      <div id="expense-list"></div>
      <div id="expense-empty" class="empty-state" style="display:none;">
        Chưa có chi tiêu nào trong tháng này
      </div>
    </section>
  </main>

  <!-- Chart page -->
  <main id="chart-page" style="display:none;">
    <section style="padding:16px;">
      <h2 style="margin-bottom:4px;color:var(--gray-700);">Biểu đồ chi tiêu</h2>
      <p id="chart-subtitle" style="font-size:12px;color:var(--gray-500);margin-bottom:16px;"></p>
      <div id="chart-legend" class="chart-legend"></div>
      <div class="chart-container">
        <canvas id="expense-chart"></canvas>
      </div>
    </section>
    <section style="padding:0 16px 16px;">
      <h2 style="margin-bottom:12px;color:var(--gray-700);">Chi tiêu theo danh mục</h2>
      <div class="pie-chart-wrapper">
        <canvas id="pie-chart"></canvas>
      </div>
      <div id="pie-legend" class="pie-legend"></div>
    </section>
  </main>

  <!-- FAB -->
  <button id="fab" aria-label="Thêm chi tiêu">+</button>

  <!-- Expense Modal -->
  <div id="modal-expense" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-expense-title">Thêm chi tiêu</h3>
        <button class="modal-close" data-close="modal-expense">✕</button>
      </div>
      <!-- Detail view (read-only) -->
      <div id="expense-detail" style="display:none;">
        <div class="detail-row">
          <span class="detail-label">Tiêu đề</span>
          <span class="detail-value" id="detail-title"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Số tiền</span>
          <span class="detail-value detail-amount" id="detail-amount"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Danh mục</span>
          <span class="detail-value" id="detail-category"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Ngày</span>
          <span class="detail-value" id="detail-date"></span>
        </div>
        <div id="detail-images" class="detail-images"></div>
        <div class="form-actions">
          <button type="button" id="btn-edit-expense" class="btn-primary">✏️ Chỉnh sửa</button>
        </div>
      </div>

      <!-- Edit form -->
      <form id="form-expense" style="display:none;">
        <input type="hidden" id="expense-id">

        <div class="floating-field">
          <input type="text" id="expense-title" required placeholder=" ">
          <label for="expense-title">Tiêu đề</label>
        </div>

        <div class="floating-field">
          <input type="text" id="expense-amount" required placeholder=" " inputmode="numeric" class="money-input">
          <label for="expense-amount">Số tiền (đ)</label>
        </div>

        <div class="floating-field">
          <select id="expense-category" required></select>
          <label for="expense-category">Danh mục</label>
        </div>

        <div class="floating-field">
          <input type="datetime-local" id="expense-date" required>
          <label for="expense-date">Ngày giờ</label>
        </div>

        <!-- Budget info -->
        <div id="expense-budget-info" class="budget-info" style="display:none;"></div>

        <div class="floating-field">
          <input type="file" id="expense-images" accept="image/*" multiple>
          <label>Ảnh (tối đa 5)</label>
        </div>
        <div id="expense-image-preview" class="image-preview"></div>

        <div class="form-actions">
          <button type="button" id="btn-delete-expense" class="btn-danger" style="display:none;">Xóa</button>
          <button type="submit" class="btn-primary">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Budget Modal -->
  <div id="modal-budget" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-budget-title">Đặt ngân sách</h3>
        <button class="modal-close" data-close="modal-budget">✕</button>
      </div>
      <form id="form-budget">
        <div class="floating-field">
          <select id="budget-category" required></select>
          <label for="budget-category">Danh mục</label>
        </div>

        <div id="new-category-section" style="display:none;">
          <div class="floating-field">
            <input type="text" id="new-cat-icon" placeholder=" " maxlength="2" style="width:60px;text-align:center;font-size:20px;display:inline-block;">
            <label for="new-cat-icon">Icon</label>
          </div>
          <div class="floating-field">
            <input type="text" id="new-cat-name" placeholder=" " maxlength="30">
            <label for="new-cat-name">Tên danh mục</label>
          </div>
          <div class="form-actions" style="margin-top:12px;">
            <button type="button" id="btn-save-category" class="btn-primary" style="font-size:14px;padding:10px;">Tạo danh mục</button>
            <button type="button" id="btn-cancel-category" class="btn-danger" style="font-size:14px;padding:10px;">Hủy</button>
          </div>
        </div>
        <button type="button" id="btn-new-category" class="btn-new-category">+ Tạo danh mục mới</button>

        <div class="floating-field">
          <input type="text" id="budget-amount" required placeholder=" " inputmode="numeric" class="money-input">
          <label for="budget-amount">Số tiền (đ)</label>
        </div>

        <div class="form-actions">
          <button type="button" id="btn-delete-budget" class="btn-danger" style="display:none;">Xóa</button>
          <button type="submit" class="btn-primary">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Cài đặt</h3>
        <button class="modal-close" data-close="modal-settings">✕</button>
      </div>
      <div class="settings-list">
        <button id="btn-manage-categories" class="settings-btn">🏷️ Quản lý danh mục</button>
        <button id="btn-export" class="settings-btn">📤 Xuất dữ liệu (JSON)</button>
        <button id="btn-import" class="settings-btn">📥 Nhập dữ liệu (JSON)</button>
        <input type="file" id="import-file" accept=".json" style="display:none;">
        <p class="settings-note">⚠️ Nhập dữ liệu sẽ thay thế toàn bộ dữ liệu hiện tại</p>
      </div>
    </div>
  </div>

  <!-- Category Management Modal -->
  <div id="modal-categories" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Quản lý danh mục</h3>
        <button class="modal-close" data-close="modal-categories">✕</button>
      </div>
      <div id="category-list" class="category-list"></div>
      <div class="cat-add-row">
        <input type="text" id="cat-add-icon" placeholder="📌" maxlength="2" class="cat-add-icon-input">
        <input type="text" id="cat-add-name" placeholder="Tên danh mục" class="cat-add-name-input">
        <button type="button" id="btn-cat-add" class="btn-cat-add">Thêm</button>
      </div>
    </div>
  </div>

  <!-- Fullscreen image viewer -->
  <div id="image-viewer" class="image-viewer" style="display:none;">
    <button id="image-viewer-close" class="image-viewer-close">✕</button>
    <img id="image-viewer-img" src="" alt="">
  </div>

  <script src="app.js"></script>
</body>
</html>
